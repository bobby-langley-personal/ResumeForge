name: Claude Code

on:
  issues:
    types: [opened, labeled, edited]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened, synchronize]

jobs:
  claude:
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'claude')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'pull_request')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      actions: write
      checks: write
      repository-projects: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Claude Code
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GH_PAT }}
          custom_instructions: |
            You are an expert full-stack developer working on ResumeForge —
            an AI-powered resume and cover letter generator. Users paste a
            job description and their background, and the app generates
            tailored, ATS-optimized documents as downloadable PDFs.

            REPOSITORY CONTEXT:
            - Next.js 14 (App Router), TypeScript, Tailwind CSS, shadcn/ui
            - Clerk for auth, Supabase for database
            - Anthropic SDK for AI generation
            - @react-pdf/renderer for PDF output
            - Vercel for deployment
            - Always read CLAUDE_PROJECT_CONTEXT.md and TYPES.md at the
              start of every session

            ================================================================
            CRITICAL: THESE TYPE ERRORS MUST NEVER HAPPEN IN THIS REPO
            They have burned significant time and tokens in previous projects.
            ================================================================

            ERROR 1 — Union type mismatches
            Before using ANY string as a typed function argument:
              1. Find the union type definition (check TYPES.md)
              2. Add the new value to the union type FIRST
              3. Update TYPES.md to reflect the change
              4. Only then write the call site
            Never assume a string value exists in a union. Always verify.

            ERROR 2 — Cannot redeclare block-scoped variable
            Never use const/let with the same name twice in the same scope
            or sibling if/else blocks. Use unique descriptive names.

            ERROR 3 — Cannot find name (variable not in scope)
            Every variable you reference must be declared in the current
            function scope. Do not assume outer scope variables are
            available inside callbacks, async blocks, or helper functions.

            ERROR 4 — Anthropic SDK streaming delta type
            chunk.delta.text does not exist on the union type directly.
            Always narrow the type first:
              chunk.delta.type === 'text_delta' ? chunk.delta.text : ''

            ================================================================
            KNOWN PROBLEM PATTERNS — NEVER DO THESE
            ================================================================

            Supabase imports — only two valid imports exist in this repo:
              import { supabaseServer } from '@/lib/supabase'
              import { supabaseBrowser } from '@/lib/supabase'
            NEVER import from paths that do not exist:
              @/lib/supabase/server  ← does not exist, will cause TS2307
              @/lib/supabase/client  ← does not exist, will cause TS2307
              @/lib/supabase/browser ← does not exist, will cause TS2307

            @react-pdf/renderer in API routes:
            - NEVER use JSX syntax in nodejs API routes for PDF rendering
            - ALWAYS use createElement() from react:
                import { createElement } from 'react'
                const element = createElement(ResumePDF, props)
                const pdfBuffer = await renderToBuffer(element as React.ReactElement<any>)
            - NEVER pass Buffer directly to NextResponse body
              ALWAYS wrap: new Uint8Array(pdfBuffer)
            - PDF components already contain their own <Document> wrapper
              Do NOT add another <Document> in the route file

            ================================================================

            ARCHITECTURE RULES — ALWAYS FOLLOW:

            1. Edge runtime on every API route that calls Anthropic:
               export const runtime = 'edge'
               Missing this causes 10 second Vercel timeouts.
               EXCEPTION: PDF download routes use 'nodejs' runtime.

            2. Never hardcode model strings. Always use lib/models.ts:
               import { MODELS } from '@/lib/models'
               model: MODELS.SONNET  or  model: MODELS.HAIKU

            3. SSE streaming — never implement inline. Use lib/sse-reader.ts:
               import { readSSEStream } from '@/lib/sse-reader'

            4. Edge functions are stateless — never use in-memory Maps
               for cross-request state. Use Supabase for session storage.

            5. JSON from Claude often has markdown fences.
               Always use parseStageJSON() from lib/pipeline-utils.ts
               instead of raw JSON.parse() on API responses.

            6. Supabase RLS policies — never reference the users table
               from within a policy on another table. Use auth.uid()
               directly to avoid infinite recursion.

            BRANCH MANAGEMENT — CRITICAL:
            When fixing TypeScript errors after a failed check, you MUST
            continue working on the SAME branch that was created for this
            issue. NEVER create a new branch when fixing errors.
            Before making any changes, check for an existing branch:
              git branch -r | grep claude/issue-ISSUENUMBER
            Then checkout that branch and push fixes to it.
            Creating a new branch on a correction attempt wastes tokens
            and creates duplicate PRs.

            CANNOT RUN SHELL COMMANDS:
            You cannot run npx tsc --noEmit in this environment.
            A mandatory TypeScript check runs automatically after your
            changes. If it fails you will receive the full error output
            as a comment. Fix every error before pushing again.

            GENERAL RULES:
            - Follow existing code patterns and conventions
            - Keep all existing functionality unless explicitly told otherwise
            - Update CLAUDE_PROJECT_CONTEXT.md when making significant changes
            - Update TYPES.md whenever you add or modify any type definition
            - Consider accessibility and UX in all UI changes

      # Runs automatically after Claude — completely outside Claude's control
      - name: Check for hallucinated imports
        run: |
          echo "Checking for known bad import patterns..."
          FAILED=0
          if grep -r "from '@/lib/supabase/server'" app/ lib/ --include="*.ts" --include="*.tsx" 2>/dev/null; then
            echo "❌ Found import from @/lib/supabase/server — this file does not exist. Use @/lib/supabase"
            FAILED=1
          fi
          if grep -r "from '@/lib/supabase/client'" app/ lib/ --include="*.ts" --include="*.tsx" 2>/dev/null; then
            echo "❌ Found import from @/lib/supabase/client — this file does not exist. Use @/lib/supabase"
            FAILED=1
          fi
          if [ $FAILED -eq 1 ]; then
            exit 1
          fi
          echo "✅ No hallucinated imports found"

      - name: Mandatory TypeScript verification
        id: typecheck
        run: |
          echo "Running mandatory TypeScript verification..."
          set +e
          npx tsc --noEmit 2>&1 | tee tsc_output.txt
          TSC_EXIT=${PIPESTATUS[0]}
          set -e
          echo "tsc_exit=$TSC_EXIT" >> $GITHUB_OUTPUT
          {
            echo "tsc_output<<EOF"
            cat tsc_output.txt
            echo "EOF"
          } >> $GITHUB_OUTPUT
          exit $TSC_EXIT

      - name: Post type errors back to Claude as a comment
        if: failure() && (steps.typecheck.outcome == 'failure')
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const tscOutput = process.env.TSC_OUTPUT;
            const issueNumber = context.issue?.number
              || context.payload.pull_request?.number;
            if (!issueNumber) {
              console.log('No issue number found, skipping comment');
              return;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });
            const errorCount = comments.filter(c =>
              c.body && c.body.includes('TypeScript Check Failed')
            ).length;

            if (errorCount >= 3) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: [
                  '## 🛑 Type Check Loop Detected — Human Review Required',
                  '',
                  'This issue has failed TypeScript checks **3 times in a row**.',
                  'Stopping the correction loop to prevent further token waste.',
                  '',
                  'A human needs to manually review the type definitions.',
                  'Check `TYPES.md` and the errors in previous comments.',
                ].join('\n')
              });
              process.exit(1);
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                `## ❌ TypeScript Check Failed — Fix Required (Attempt ${errorCount + 1}/3)`,
                '',
                '@claude Your changes have TypeScript errors. Fix them on the',
                '**SAME BRANCH** you already created for this issue — do NOT',
                'create a new branch. Check for your existing branch first:',
                '`git branch -r | grep claude/issue-' + issueNumber + '`',
                'Then checkout that branch, fix the errors, and push to it.',
                '',
                'Errors to fix:',
                '```',
                tscOutput,
                '```',
                '',
                '**Before fixing — read TYPES.md first.**',
                '',
                '**Most common causes in this repo:**',
                '- Import from @/lib/supabase/server → use @/lib/supabase instead',
                '- @react-pdf renderToBuffer → use createElement(), not JSX',
                '- Buffer in Response → wrap with new Uint8Array(pdfBuffer)',
                '- String not in union type → add it to the type definition first',
                '- Cannot redeclare variable → use a unique variable name',
                '- chunk.delta.text → narrow with chunk.delta.type === "text_delta" first',
                '',
                'Fix ALL errors above, not just the first one.',
              ].join('\n')
            });
        env:
          TSC_OUTPUT: ${{ steps.typecheck.outputs.tsc_output }}

      - name: Fail workflow if type check failed
        if: failure() && (steps.typecheck.outcome == 'failure')
        run: |
          echo "❌ TypeScript errors found. PR creation blocked."
          exit 1

      - name: Auto-create PR if checks passed
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number }}

          # Find existing claude branch for this issue number specifically
          BRANCH=$(git branch -r | grep "claude/issue-${ISSUE_NUMBER}-" | tail -1 | xargs)
          BRANCH=${BRANCH#origin/}

          if [ -z "$BRANCH" ]; then
            echo "No claude/* branch found for issue ${ISSUE_NUMBER} — skipping PR creation"
            exit 0
          fi

          # Check if a PR already exists for this branch — skip if so
          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number -q '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #${EXISTING_PR} already exists for branch ${BRANCH} — skipping"
            exit 0
          fi

          ISSUE_TITLE=$(gh issue view $ISSUE_NUMBER --json title -q .title 2>/dev/null || echo "Claude fix")

          gh pr create \
            --title "Claude: $ISSUE_TITLE" \
            --body "Closes #$ISSUE_NUMBER

          ## ✅ TypeScript Verified
          This PR was opened only after \`npx tsc --noEmit\` passed with zero errors.

          ## Changes
          Automatically generated by Claude Code in response to issue #$ISSUE_NUMBER." \
            --base main \
            --head "$BRANCH" \
          || echo "Could not create PR — skipping"
